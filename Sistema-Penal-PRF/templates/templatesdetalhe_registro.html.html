<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Detalhe do Registro</title>
</head>
<body>
    <h1>Detalhe do Registro</h1>

    <a href="{{ url_for('index') }}">Voltar</a>

    <p><strong>Nome:</strong> {{ registro.nome }}</p>
    <p><strong>Passaporte:</strong> {{ registro.passaporte }}</p>
    <p><strong>Crimes:</strong> {{ registro.crimes }}</p>
    <p><strong>Relatório:</strong> {{ registro.relatorio }}</p>

    <h2>Imagens</h2>
    {% for img in imagens %}
        <img src="{{ img.url }}" width="200" style="margin:10px;">
    {% endfor %}
</body>
</html>
