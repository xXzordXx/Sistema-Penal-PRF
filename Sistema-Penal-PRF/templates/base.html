<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sistema Penal PRF{% endblock %}</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --panel-2: #0f172a;
      --line: #243041;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --brand: #2563eb;
      --brand-2: #1d4ed8;
      --radius: 16px;
      --shadow: 0 18px 50px rgba(0,0,0,.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #08101d 0%, #0b1220 100%);
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      background: linear-gradient(180deg, rgba(17,24,39,.96), rgba(15,23,42,.96));
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(37,99,235,.12);
      border: 1px solid rgba(37,99,235,.28);
      color: #dbeafe;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      color: #dbe5f1;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(8,15,28,.95);
      color: #fff;
      outline: none;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(37,99,235,.3);
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 270px 1fr;
    }

    .sidebar {
      background: rgba(10,16,28,.92);
      border-right: 1px solid var(--line);
      padding: 22px;
      height: 100vh;
    }

    .content {
      padding: 28px;
    }

    .card {
      background: linear-gradient(180deg, rgba(17,24,39,.96), rgba(15,23,42,.96));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  {% if session.get('user') %}
    <div class="app">
      <aside class="sidebar">
        <h2>Sistema Penal PRF</h2>
        <p>Painel operacional</p>
        <hr>
        <p><a href="{{ url_for('index') }}">Dashboard</a></p>
        <p><a href="{{ url_for('novo') }}">Novo registro</a></p>
        <p><a href="{{ url_for('consulta') }}">Consulta</a></p>
        <p><a href="{{ url_for('logout') }}">Sair</a></p>
      </aside>

      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  {% else %}
    {% block auth_content %}{% endblock %}
  {% endif %}
</body>
</html>
